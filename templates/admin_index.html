{% extends 'base.html' %}
{% block title %}超级控制台{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-2">
        <div class="list-group">
            <a href="{% url 'admin_index' %}" class="list-group-item active"><i class="fa fa-dashboard"></i> 仪表盘</a>
            <a href="{% url 'admin_user_list' %}" class="list-group-item"><i class="fa fa-users"></i> 用户管理</a>
            <a href="{% url 'admin_movie_list' %}" class="list-group-item"><i class="fa fa-film"></i> 电影管理</a>
            <a href="{% url 'admin_actor_list' %}" class="list-group-item"><i class="fa fa-star"></i> 演员管理</a>
            <a href="{% url 'admin_comments' %}" class="list-group-item"><i class="fa fa-comments"></i> 评论管理</a>
            <a href="{% url 'admin_director_list' %}" class="list-group-item"><i class="fa fa-male"></i> 导演管理</a>
            <a href="{% url 'admin_user_profile_list' %}" class="list-group-item"><i class="fa fa-id-card"></i> 用户画像</a>
            <a href="{% url 'admin_agent_trace_list' %}" class="list-group-item"><i class="fa fa-code"></i> Agent推理链</a>
            <a href="{% url 'admin_user_feedback_list' %}" class="list-group-item"><i class="fa fa-thumbs-up"></i> 用户反馈</a>
        </div>
    </div>

    <div class="col-md-10">
        <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <i class="fa fa-rocket"></i> 系统运维中心
        </h2>

        <div class="row text-center" style="margin-top: 20px;">
            <div class="col-md-4">
                <div class="panel panel-primary">
                    <div class="panel-heading">电影总数</div>
                    <div class="panel-body">
                        <h3>{{ movie_count }}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="panel panel-success">
                    <div class="panel-heading">用户总数</div>
                    <div class="panel-body">
                        <h3>{{ user_count }}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="panel panel-info">
                    <div class="panel-heading">交互总数</div>
                    <div class="panel-body">
                        <h3>{{ rating_count }}</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">用户性别分布</div>
                    <div class="panel-body">
                        <div id="chart-sex" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">用户职业分布 (Top 10)</div>
                    <div class="panel-body">
                        <div id="chart-occ" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block js %}
<script>
    $(document).ready(function() {
        var chartSex = echarts.init(document.getElementById('chart-sex'));
        var chartOcc = echarts.init(document.getElementById('chart-occ'));

        $.get("{% url 'admin_user_stats' %}", function(data) {
            chartSex.setOption({
                tooltip: { trigger: 'item' },
                legend: { top: '5%', left: 'center' },
                series: [{
                    name: '性别',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: data.sex_data.map(function(item) { return {value: item.count, name: item.name}; })
                }]
            });

            chartOcc.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: {
                    type: 'category',
                    data: data.occ_data.map(function(item) { return item.name; }),
                    axisLabel: { rotate: 45, interval: 0 }
                },
                yAxis: { type: 'value' },
                series: [{
                    data: data.occ_data.map(function(item) { return item.count; }),
                    type: 'bar',
                    itemStyle: { color: '#5bc0de' }
                }]
            });
        });

        window.onresize = function() {
            chartSex.resize();
            chartOcc.resize();
        };
    });
</script>
{% endblock %}
