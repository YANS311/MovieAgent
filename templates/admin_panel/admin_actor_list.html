{% extends 'base.html' %}
{% block title %}演员管理{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-2">
        <div class="list-group">
            <a href="{% url 'admin_index' %}" class="list-group-item"><i class="fa fa-dashboard"></i> 仪表盘</a>
            <a href="{% url 'admin_user_list' %}" class="list-group-item"><i class="fa fa-users"></i> 用户管理</a>
            <a href="{% url 'admin_movie_list' %}" class="list-group-item"><i class="fa fa-film"></i> 电影管理</a>
            <a href="{% url 'admin_actor_list' %}" class="list-group-item active"><i class="fa fa-star"></i> 演员管理</a>
            <a href="{% url 'admin_comments' %}" class="list-group-item"><i class="fa fa-comments"></i> 评论管理</a>
            <a href="{% url 'admin_director_list' %}" class="list-group-item"><i class="fa fa-male"></i> 导演管理</a>
            <a href="{% url 'admin_user_profile_list' %}" class="list-group-item"><i class="fa fa-id-card"></i> 用户画像</a>
            <a href="{% url 'admin_agent_trace_list' %}" class="list-group-item"><i class="fa fa-code"></i> Agent推理链</a>
            <a href="{% url 'admin_user_feedback_list' %}" class="list-group-item"><i class="fa fa-thumbs-up"></i> 用户反馈</a>
        </div>
    </div>

    <div class="col-md-10">
        <div class="page-header" style="margin-top: 0;">
            <h1>演员管理</h1>
        </div>

        <div class="row" style="margin-bottom: 20px;">
            <div class="col-md-8">
                <a href="{% url 'admin_actor_add' %}" class="btn btn-success">
                    <i class="fa fa-plus"></i> 添加新演员
                </a>
            </div>
            <div class="col-md-4">
                <form method="GET" action="">
                    <div class="input-group">
                        <input type="text" name="q" class="form-control" placeholder="搜索演员姓名..." value="{{ query|default:'' }}">
                        <span class="input-group-btn">
                            <button class="btn btn-primary" type="submit">
                                <i class="fa fa-search"></i>
                            </button>
                        </span>
                    </div>
                </form>
            </div>
        </div>

        <div class="panel panel-default">
            <div class="panel-heading">演员列表</div>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th style="width: 100px;">ID</th>
                        <th>姓名</th>
                        <th style="width: 200px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for actor in actors %}
                    <tr>
                        <td>{{ actor.id }}</td>
                        <td>{{ actor.name }}</td>
                        <td>
                            <a href="{% url 'admin_actor_edit' actor.pk %}" class="btn btn-info btn-xs">
                                <i class="fa fa-pencil"></i> 编辑
                            </a>
                            <a href="{% url 'admin_actor_delete' actor.pk %}"
                               class="btn btn-danger btn-xs"
                               onclick="return confirm('确定要删除演员 {{ actor.name }} 吗？');">
                                <i class="fa fa-trash"></i> 删除
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">暂无演员数据</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="text-center">
            <ul class="pagination">
                {{ page_string|safe }}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
