{% extends 'base.html' %}
{% block title %}确认删除{% endblock %}

{% block content %}
<div class="page-header">
    <h1>确认删除</h1>
</div>

<div class="alert alert-danger">
    <h4><i class="fa fa-warning"></i> 你确定要删除 "{{ target_name }}" 吗?</h4>
    <p>此操作不可逆！</p>
</div>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        <i class="fa fa-trash"></i> 确认删除
    </button>
    <a href="{% url cancel_url %}" class="btn btn-default">
        取消
    </a>
</form>
{% endblock %}
